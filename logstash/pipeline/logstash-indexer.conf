input {
  # Read from the Kafka 'logs' topic.
  # Multiple indexer replicas each join the same consumer group so Kafka
  # distributes partitions across them automatically — horizontal scale-out
  # is achieved by increasing the replica count in docker-compose.
  kafka {
    bootstrap_servers => "log-kafka:29093"
    topics            => ["logs"]
    group_id          => "logstash-indexer"
    consumer_threads  => 4
    codec             => json
    auto_offset_reset => "earliest"
  }
}

output {
  elasticsearch {
    hosts  => ["http://elasticsearch:9200"]
    index  => "app-logs-%{+YYYY.MM.dd}"
    action => "index"
  }
}
