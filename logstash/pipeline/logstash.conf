input {
  gelf {
    port => 12201
    type => "docker"
  }
}

filter {
  # GELF host field = container name — promote to a top-level field
  mutate {
    rename => { "host" => "container" }
  }

  # Parse the pino JSON payload that arrives in the 'message' field
  json {
    source  => "message"
    target  => "pino"
    tag_on_failure => ["_pino_parse_failure"]
  }

  # Lift the key pino fields to the top level for easy filtering in Kibana
  if [pino] {
    mutate {
      add_field => {
        "level"   => "%{[pino][level]}"
        "context" => "%{[pino][context]}"
        "msg"     => "%{[pino][msg]}"
      }
    }
  }
}

output {
  # Push every log event onto the Kafka 'logs' topic.
  # Kafka acts as a durable buffer — if Elasticsearch is slow or
  # temporarily unavailable, events queue here instead of being dropped.
  kafka {
    bootstrap_servers => "log-kafka:29093"
    topic_id          => "logs"
    codec             => json
  }
}
