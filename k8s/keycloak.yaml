apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-data
  namespace: redis-api
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: redis-api
spec:
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      serviceAccountName: keycloak
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args: ["start", "--import-realm"]
          ports:
            - containerPort: 8080
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KEYCLOAK_ADMIN_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/keycloak
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import/realm-export.json
              subPath: realm-export.json
            - name: data
              mountPath: /opt/keycloak/data
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - >
                  exec 3<>/dev/tcp/localhost/8080 &&
                  echo -e 'GET /realms/redis-api HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 &&
                  grep -q '"realm"' <&3
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 20
      volumes:
        - name: realm
          configMap:
            name: keycloak-realm
        - name: data
          persistentVolumeClaim:
            claimName: keycloak-data
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: redis-api
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
---
# Job that sets the real client secrets after the realm is imported.
# Mirrors the docker-compose keycloak-init service.
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-init
  namespace: redis-api
spec:
  template:
    spec:
      serviceAccountName: keycloak
      restartPolicy: OnFailure
      containers:
        - name: init
          image: python:3.12-alpine
          command: ["python", "/init/init.py"]
          env:
            - name: KEYCLOAK_INTERNAL_URL
              value: http://keycloak:8080
            - name: KEYCLOAK_REALM
              value: redis-api
            - name: KEYCLOAK_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KEYCLOAK_ADMIN_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KEYCLOAK_ADMIN_CLIENT_SECRET
            - name: ORDER_CONSUMER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ORDER_CONSUMER_CLIENT_SECRET
          volumeMounts:
            - name: init-script
              mountPath: /init
      volumes:
        - name: init-script
          configMap:
            name: keycloak-init-script
