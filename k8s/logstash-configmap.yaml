apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-ingest-config
  namespace: redis-api
data:
  logstash.conf: |
    input {
      gelf {
        port => 12201
        type => "docker"
      }
    }

    filter {
      mutate {
        rename => { "host" => "container" }
      }

      json {
        source        => "message"
        target        => "pino"
        tag_on_failure => ["_pino_parse_failure"]
      }

      if [pino] {
        mutate {
          add_field => {
            "level"   => "%{[pino][level]}"
            "context" => "%{[pino][context]}"
            "msg"     => "%{[pino][msg]}"
          }
        }
      }
    }

    output {
      kafka {
        bootstrap_servers => "log-kafka:9093"
        topic_id          => "logs"
        codec             => json
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-indexer-config
  namespace: redis-api
data:
  logstash-indexer.conf: |
    input {
      kafka {
        bootstrap_servers => "log-kafka:9093"
        topics            => ["logs"]
        group_id          => "logstash-indexer"
        consumer_threads  => 4
        codec             => json
        auto_offset_reset => "earliest"
      }
    }

    output {
      elasticsearch {
        hosts  => ["http://elasticsearch:9200"]
        index  => "app-logs-%{+YYYY.MM.dd}"
        action => "index"
      }
    }
