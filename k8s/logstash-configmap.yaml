apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: redis-api-logging
data:
  logstash.conf: |
    input {
      gelf {
        port => 12201
        type => "docker"
      }
    }

    filter {
      # GELF host field = container name — promote to a top-level field.
      # GELF level field = numeric severity (0-7) — rename so it does not
      # conflict with the pino string level ("info", "warn", …) added below.
      mutate {
        rename => {
          "host"  => "container"
          "level" => "gelf_level"
        }
      }

      # Parse the pino JSON payload that arrives in the 'message' field
      json {
        source  => "message"
        target  => "pino"
        tag_on_failure => ["_pino_parse_failure"]
      }

      # Lift the key pino fields to the top level for easy filtering in Kibana
      if [pino] {
        mutate {
          add_field => {
            "level"   => "%{[pino][level]}"
            "context" => "%{[pino][context]}"
            "msg"     => "%{[pino][msg]}"
          }
        }
        if [pino][correlationId] {
          mutate {
            add_field => { "correlationId" => "%{[pino][correlationId]}" }
          }
        }
      }
    }

    output {
      elasticsearch {
        hosts    => ["http://elasticsearch:9200"]
        user     => "elastic"
        password => "${ELASTIC_PASSWORD}"
        index    => "app-logs-%{+YYYY.MM.dd}"
        action   => "index"
      }
    }
