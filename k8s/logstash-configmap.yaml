apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-ingest-config
  namespace: redis-api
data:
  logstash.conf: |
    input {
      gelf {
        port => 12201
        type => "docker"
      }
    }

    filter {
      mutate {
        rename => {
          "host"  => "container"
          "level" => "gelf_level"
        }
      }

      json {
        source         => "message"
        target         => "pino"
        tag_on_failure => ["_pino_parse_failure"]
      }

      if [pino] {
        mutate {
          add_field => {
            "level"   => "%{[pino][level]}"
            "context" => "%{[pino][context]}"
            "msg"     => "%{[pino][msg]}"
          }
        }
        if [pino][correlationId] {
          mutate {
            add_field => { "correlationId" => "%{[pino][correlationId]}" }
          }
        }
      }
    }

    output {
      kafka {
        bootstrap_servers => "log-kafka:9093"
        topic_id          => "logs"
        codec             => json
        security_protocol => "SASL_PLAINTEXT"
        sasl_mechanism    => "PLAIN"
        sasl_jaas_config  => "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"${KAFKA_USER}\" password=\"${KAFKA_PASSWORD}\";"
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-indexer-config
  namespace: redis-api
data:
  logstash-indexer.conf: |
    input {
      kafka {
        bootstrap_servers => "log-kafka:9093"
        topics            => ["logs"]
        group_id          => "logstash-indexer"
        consumer_threads  => 4
        codec             => json
        auto_offset_reset => "earliest"
        security_protocol => "SASL_PLAINTEXT"
        sasl_mechanism    => "PLAIN"
        sasl_jaas_config  => "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"${KAFKA_USER}\" password=\"${KAFKA_PASSWORD}\";"
      }
    }

    output {
      elasticsearch {
        hosts    => ["http://elasticsearch:9200"]
        user     => "elastic"
        password => "${ELASTIC_PASSWORD}"
        index    => "app-logs-%{+YYYY.MM.dd}"
        action   => "index"
      }
    }
