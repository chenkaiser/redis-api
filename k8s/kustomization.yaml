apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespaces (must be first)
  - namespace.yaml
  # Secrets and service accounts (per namespace)
  - serviceaccounts.yaml
  - app-secrets.yaml
  # redis-api-infra
  - redis.yaml
  - postgres.yaml
  - zookeeper.yaml
  - kafka.yaml
  - keycloak-configmap.yaml
  - keycloak.yaml
  # redis-api-logging
  - elasticsearch.yaml
  - logstash-configmap.yaml
  - logstash.yaml
  - kibana.yaml
  # redis-api-app
  - product-api.yaml
  - order-consumer.yaml
  # Istio mesh policy (all namespaces)
  - peer-authentication.yaml
  - authorization-policies.yaml
