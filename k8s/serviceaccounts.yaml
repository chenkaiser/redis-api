# One ServiceAccount per workload.
# Istio binds the SPIFFE identity to the SA:
#   spiffe://cluster.local/ns/redis-api/sa/<name>
# AuthorizationPolicies reference these identities to control who can
# reach which service — this replaces Kafka SASL and supplements Redis
# password auth.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-api
  namespace: redis-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-consumer
  namespace: redis-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis
  namespace: redis-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka
  namespace: redis-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: log-kafka
  namespace: redis-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zookeeper
  namespace: redis-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: log-zookeeper
  namespace: redis-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: redis-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elasticsearch
  namespace: redis-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: logstash
  namespace: redis-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kibana
  namespace: redis-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak
  namespace: redis-api
