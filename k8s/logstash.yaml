# Single Logstash instance: accepts GELF from pods, writes directly to
# Elasticsearch. A persisted queue buffers events on disk if ES is slow
# or temporarily unavailable — no intermediate Kafka cluster needed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: redis-api
spec:
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      serviceAccountName: logstash
      containers:
        - name: logstash
          image: logstash:8.13.0
          ports:
            - containerPort: 12201
              protocol: UDP
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: PIPELINE_BATCH_SIZE
              value: "1000"
            - name: PIPELINE_BATCH_DELAY
              value: "50"
            - name: QUEUE_TYPE
              value: "persisted"
            - name: QUEUE_MAX_BYTES
              value: "1gb"
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ELASTIC_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
          readinessProbe:
            httpGet:
              path: /_node/stats
              port: 9600
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
      volumes:
        - name: config
          configMap:
            name: logstash-config
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: redis-api
spec:
  selector:
    app: logstash
  ports:
    - port: 12201
      targetPort: 12201
      protocol: UDP
