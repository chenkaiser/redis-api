# All application secrets. This file is gitignored — copy from
# app-secrets.example.yaml and fill in real values before applying.
#
# Secrets are duplicated across namespaces because K8s Secrets are
# namespace-scoped. In production use External Secrets Operator to
# sync from a single source (Azure Key Vault, AWS Secrets Manager, etc.).
#
# To apply:  kubectl apply -f k8s/app-secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: redis-api-infra
type: Opaque
stringData:
  REDIS_PASSWORD: "redis-dev-password"
  KAFKA_USER: "admin"
  KAFKA_PASSWORD: "kafka-dev-password"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "orders"
  ELASTIC_PASSWORD: "elastic-dev-password"
  KEYCLOAK_ADMIN_USER: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "admin"
  KEYCLOAK_ADMIN_CLIENT_SECRET: "auth-service-secret"
  ORDER_CONSUMER_CLIENT_SECRET: "order-consumer-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: redis-api-logging
type: Opaque
stringData:
  ELASTIC_PASSWORD: "elastic-dev-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: redis-api-app
type: Opaque
stringData:
  REDIS_PASSWORD: "redis-dev-password"
  KAFKA_USER: "admin"
  KAFKA_PASSWORD: "kafka-dev-password"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "orders"
  KEYCLOAK_ADMIN_CLIENT_SECRET: "auth-service-secret"
