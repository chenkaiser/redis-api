# Enforce STRICT mTLS for the entire redis-api namespace.
# Every pod-to-pod connection must present a valid Istio-issued X.509
# certificate. Plaintext connections are rejected at the sidecar proxy.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: redis-api
spec:
  mtls:
    mode: STRICT
