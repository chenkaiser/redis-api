apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: es-data
  namespace: redis-api
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: redis-api
spec:
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      initContainers:
        # Elasticsearch requires vm.max_map_count >= 262144
        - name: sysctl
          image: busybox
          securityContext:
            privileged: true
          command: [sysctl, -w, vm.max_map_count=262144]
        - name: fix-permissions
          image: busybox
          command: [sh, -c, "chown -R 1000:1000 /usr/share/elasticsearch/data"]
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
      containers:
        - name: elasticsearch
          image: elasticsearch:8.13.0
          ports:
            - containerPort: 9200
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
            - name: thread_pool.write.queue_size
              value: "1000"
          resources:
            requests:
              memory: "1.5Gi"
            limits:
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: es-data
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: redis-api
spec:
  selector:
    app: elasticsearch
  ports:
    - port: 9200
      targetPort: 9200
