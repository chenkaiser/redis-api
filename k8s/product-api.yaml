apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api
  namespace: redis-api
spec:
  selector:
    matchLabels:
      app: product-api
  template:
    metadata:
      labels:
        app: product-api
    spec:
      serviceAccountName: product-api
      containers:
        - name: product-api
          image: product-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
            - name: AUTH_PROVIDER_TYPE
              value: keycloak
            # Redis
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_PASSWORD
            # Kafka
            - name: KAFKA_BROKER
              value: kafka:9092
            - name: KAFKA_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KAFKA_USER
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KAFKA_PASSWORD
            # Keycloak
            - name: KEYCLOAK_JWKS_URI
              value: http://keycloak:8080/realms/redis-api/protocol/openid-connect/certs
            - name: KEYCLOAK_ISSUER
              value: http://keycloak:8080/realms/redis-api
            - name: KEYCLOAK_AUDIENCE
              value: product-api
            - name: KEYCLOAK_INTERNAL_URL
              value: http://keycloak:8080
            - name: KEYCLOAK_REALM
              value: redis-api
            - name: KEYCLOAK_LOGIN_CLIENT_ID
              value: api-test
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: auth-service
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KEYCLOAK_ADMIN_CLIENT_SECRET
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: product-api
  namespace: redis-api
spec:
  type: NodePort
  selector:
    app: product-api
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
