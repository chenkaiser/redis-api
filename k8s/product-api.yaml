apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api
  namespace: redis-api
spec:
  selector:
    matchLabels:
      app: product-api
  template:
    metadata:
      labels:
        app: product-api
    spec:
      containers:
        - name: product-api
          image: product-api:latest
          # Use IfNotPresent so minikube/kind uses the locally loaded image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: KAFKA_BROKER
              value: kafka:9092
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /product/inventory
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: product-api
  namespace: redis-api
spec:
  type: NodePort
  selector:
    app: product-api
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
