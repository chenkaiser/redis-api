# App Kafka — carries inventory.item-used events
# In Kubernetes the broker uses SASL_PLAINTEXT on a single listener.
# Istio wraps every connection in mTLS on top — two auth layers:
#   1. SASL/PLAIN  — application-level credential check
#   2. Istio mTLS  — network-level SPIFFE identity + AuthorizationPolicy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: redis-api-infra
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      serviceAccountName: kafka
      enableServiceLinks: false
      initContainers:
        - name: jaas-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cat > /jaas/kafka_server_jaas.conf <<EOF
              KafkaServer {
                org.apache.kafka.common.security.plain.PlainLoginModule required
                username="$KAFKA_USER"
                password="$KAFKA_PASSWORD"
                user_$KAFKA_USER="$KAFKA_PASSWORD";
              };
              EOF
          env:
            - name: KAFKA_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KAFKA_USER
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KAFKA_PASSWORD
          volumeMounts:
            - name: jaas-config
              mountPath: /jaas
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          command:
            - bash
            - -c
            - |
              /etc/confluent/docker/configure
              /etc/confluent/docker/launch
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: zookeeper:2181
            - name: KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS
              value: "6000"
            - name: KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS
              value: "6000"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: SASL_PLAINTEXT:SASL_PLAINTEXT,INTERNAL:PLAINTEXT
            - name: KAFKA_LISTENERS
              value: SASL_PLAINTEXT://0.0.0.0:9092,INTERNAL://127.0.0.1:19092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: SASL_PLAINTEXT://kafka:9092,INTERNAL://127.0.0.1:19092
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: INTERNAL
            - name: KAFKA_SASL_ENABLED_MECHANISMS
              value: PLAIN
            - name: KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL
              value: PLAIN
            - name: KAFKA_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KAFKA_USER
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KAFKA_PASSWORD
            - name: KAFKA_OPTS
              value: "-Djava.security.auth.login.config=/jaas/kafka_server_jaas.conf"
            - name: KAFKA_LISTENER_NAME_SASL_PLAINTEXT_PLAIN_SASL_JAAS_CONFIG
              value: >-
                org.apache.kafka.common.security.plain.PlainLoginModule required
                username="$(KAFKA_USER)" password="$(KAFKA_PASSWORD)"
                user_$(KAFKA_USER)="$(KAFKA_PASSWORD)";
            - name: KAFKA_SASL_JAAS_CONFIG
              value: >-
                org.apache.kafka.common.security.plain.PlainLoginModule required
                username="$(KAFKA_USER)" password="$(KAFKA_PASSWORD)";
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_CREATE_TOPICS
              value: "inventory.item-used:3:1"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: jaas-config
              mountPath: /jaas
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - kafka-broker-api-versions --bootstrap-server localhost:19092
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - kafka-broker-api-versions --bootstrap-server localhost:19092
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: jaas-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: redis-api-infra
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
