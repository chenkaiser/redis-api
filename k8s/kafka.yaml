# App Kafka — carries inventory.item-used events
# In Kubernetes the broker uses SASL_PLAINTEXT on a single listener.
# Istio wraps every connection in mTLS on top — two auth layers:
#   1. SASL/PLAIN  — application-level credential check
#   2. Istio mTLS  — network-level SPIFFE identity + AuthorizationPolicy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: redis-api
spec:
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      serviceAccountName: kafka
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: zookeeper:2181
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: SASL_PLAINTEXT:SASL_PLAINTEXT
            - name: KAFKA_LISTENERS
              value: SASL_PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: SASL_PLAINTEXT://kafka:9092
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: SASL_PLAINTEXT
            - name: KAFKA_SASL_ENABLED_MECHANISMS
              value: PLAIN
            - name: KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL
              value: PLAIN
            - name: KAFKA_LISTENER_NAME_SASL__PLAINTEXT_PLAIN_SASL_JAAS_CONFIG
              value: >-
                org.apache.kafka.common.security.plain.PlainLoginModule required
                username="$(KAFKA_USER)" password="$(KAFKA_PASSWORD)"
                user_$(KAFKA_USER)="$(KAFKA_PASSWORD)";
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_CREATE_TOPICS
              value: "inventory.item-used:3:1"
            - name: KAFKA_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KAFKA_USER
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KAFKA_PASSWORD
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - >
                  echo "security.protocol=SASL_PLAINTEXT
                  sasl.mechanism=PLAIN
                  sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username=\"$KAFKA_USER\" password=\"$KAFKA_PASSWORD\";" > /tmp/client.props &&
                  kafka-broker-api-versions --bootstrap-server localhost:9092 --command-config /tmp/client.props
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: redis-api
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
