# App Kafka — carries inventory.item-used events
# Single listener for K8s (no host-vs-container split needed inside the cluster)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: redis-api
spec:
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: zookeeper:2181
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_CREATE_TOPICS
              value: "inventory.item-used:3:1"
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "kafka-broker-api-versions --bootstrap-server localhost:9092"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: redis-api
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
---
# Log Kafka — carries logs topic only, short retention
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-kafka
  namespace: redis-api
spec:
  selector:
    matchLabels:
      app: log-kafka
  template:
    metadata:
      labels:
        app: log-kafka
    spec:
      containers:
        - name: log-kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9093
          env:
            - name: KAFKA_BROKER_ID
              value: "2"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: log-zookeeper:2182
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://log-kafka:9093
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_CREATE_TOPICS
              value: "logs:4:1"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "4"
            - name: KAFKA_LOG_RETENTION_BYTES
              value: "1073741824"
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "kafka-broker-api-versions --bootstrap-server localhost:9093"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: log-kafka
  namespace: redis-api
spec:
  selector:
    app: log-kafka
  ports:
    - port: 9093
      targetPort: 9093
