apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-consumer
  namespace: redis-api-app
spec:
  selector:
    matchLabels:
      app: order-consumer
  template:
    metadata:
      labels:
        app: order-consumer
    spec:
      serviceAccountName: order-consumer
      containers:
        - name: order-consumer
          image: order-consumer:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            # Kafka (redis-api-infra namespace)
            - name: KAFKA_BROKER
              value: kafka.redis-api-infra.svc.cluster.local:9092
            - name: KAFKA_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KAFKA_USER
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KAFKA_PASSWORD
            # Postgres (redis-api-infra namespace)
            - name: POSTGRES_HOST
              value: postgres.redis-api-infra.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
