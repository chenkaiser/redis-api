# Deny all traffic in each namespace by default, then explicitly allow
# only the paths that are needed. SPIFFE principals now include namespace:
#   spiffe://cluster.local/ns/<namespace>/sa/<serviceaccount>

# ═══════════════════════════════════════════════════════════════════════
# redis-api-infra namespace
# ═══════════════════════════════════════════════════════════════════════

apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: redis-api-infra
spec: {}

---
# Redis: only product-api (redis-api-app) may connect
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-redis
  namespace: redis-api-infra
spec:
  selector:
    matchLabels:
      app: redis
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/redis-api-app/sa/product-api"
      to:
        - operation:
            ports: ["6379"]

---
# Kafka: product-api and order-consumer (redis-api-app) may connect,
# plus kafka itself for controller inter-broker traffic
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-kafka
  namespace: redis-api-infra
spec:
  selector:
    matchLabels:
      app: kafka
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/redis-api-app/sa/product-api"
              - "cluster.local/ns/redis-api-app/sa/order-consumer"
              - "cluster.local/ns/redis-api-infra/sa/kafka"
      to:
        - operation:
            ports: ["9092"]

---
# ZooKeeper: only kafka (redis-api-infra) may connect
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-zookeeper
  namespace: redis-api-infra
spec:
  selector:
    matchLabels:
      app: zookeeper
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/redis-api-infra/sa/kafka"
      to:
        - operation:
            ports: ["2181"]

---
# PostgreSQL: order-consumer (redis-api-app) and keycloak (redis-api-infra) may connect
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-postgres
  namespace: redis-api-infra
spec:
  selector:
    matchLabels:
      app: postgres
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/redis-api-app/sa/order-consumer"
              - "cluster.local/ns/redis-api-infra/sa/keycloak"
      to:
        - operation:
            ports: ["5432"]

---
# Keycloak: product-api (redis-api-app) and keycloak itself may connect
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-keycloak
  namespace: redis-api-infra
spec:
  selector:
    matchLabels:
      app: keycloak
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/redis-api-app/sa/product-api"
              - "cluster.local/ns/redis-api-infra/sa/keycloak"
      to:
        - operation:
            ports: ["8080"]

---
# ═══════════════════════════════════════════════════════════════════════
# redis-api-logging namespace
# ═══════════════════════════════════════════════════════════════════════

apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: redis-api-logging
spec: {}

---
# Elasticsearch: logstash and kibana (same namespace) and setup job may connect
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-elasticsearch
  namespace: redis-api-logging
spec:
  selector:
    matchLabels:
      app: elasticsearch
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/redis-api-logging/sa/logstash"
              - "cluster.local/ns/redis-api-logging/sa/kibana"
              - "cluster.local/ns/redis-api-logging/sa/elasticsearch"
      to:
        - operation:
            ports: ["9200"]

---
# ═══════════════════════════════════════════════════════════════════════
# redis-api-app namespace
# ═══════════════════════════════════════════════════════════════════════

apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: redis-api-app
spec: {}

---
# product-api: allow inbound from anywhere (NodePort / ingress)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-product-api-inbound
  namespace: redis-api-app
spec:
  selector:
    matchLabels:
      app: product-api
  action: ALLOW
  rules:
    - {}   # allow all sources — external clients access via NodePort
