services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    # 'start' (production mode) requires a real DB — see KC_DB_* below.
    # Drop the keycloak-data volume if migrating from start-dev (H2 → Postgres).
    command: start --import-realm
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # Persist realm data in Postgres instead of the embedded H2 database.
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/redis-api HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 && grep -q '\"realm\"' <&3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  # Runs once after Keycloak is healthy and overwrites the placeholder client
  # secrets (set in realm-export.json) with the real values from .env.
  keycloak-init:
    image: python:3.12-alpine
    depends_on:
      keycloak:
        condition: service_healthy
    command: ["python", "/init/init.py"]
    volumes:
      - ./keycloak/init.py:/init/init.py:ro
    environment:
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: redis-api
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      ORDER_CONSUMER_CLIENT_SECRET: ${ORDER_CONSUMER_CLIENT_SECRET}
    restart: "no"

  redis:
    image: redis:7-alpine
    # Password is injected at compose time from .env — not stored in the image.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    # Port not exposed to host — only reachable within the Docker network.

  # ── App Kafka (business events) ─────────────────────────────────────────────
  # Carries: inventory.item-used
  # Long retention, replication factor 1 (dev) → 3 (prod), no log traffic.

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    # Port not exposed to host — internal use only.

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    # Port not exposed to host — apps connect via PLAINTEXT_INTERNAL://kafka:29092.
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # External listener requires SASL; internal inter-broker stays PLAINTEXT.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_LISTENER_NAME_SASL__PLAINTEXT_PLAIN_SASL_JAAS_CONFIG: "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"${KAFKA_USER}\" password=\"${KAFKA_PASSWORD}\" user_${KAFKA_USER}=\"${KAFKA_PASSWORD}\";"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Business topic — default 7-day retention, 3 partitions
      KAFKA_CREATE_TOPICS: "inventory.item-used:3:1"
    healthcheck:
      # Use the PLAINTEXT_INTERNAL listener (no auth required) for the healthcheck.
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Log Kafka (logging pipeline) ────────────────────────────────────────────
  # Carries: logs topic only
  # Short retention (4 h), high throughput, isolated from business cluster so a
  # logging burst cannot starve or destabilise order processing.

  log-zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2182
      ZOOKEEPER_TICK_TIME: 2000
    # Port not exposed to host — internal use only.

  log-kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - log-zookeeper
    # Port not exposed to host — logstash connects via PLAINTEXT_INTERNAL://log-kafka:29093.
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: log-zookeeper:2182
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://localhost:9093,PLAINTEXT_INTERNAL://log-kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_LISTENER_NAME_SASL__PLAINTEXT_PLAIN_SASL_JAAS_CONFIG: "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"${KAFKA_USER}\" password=\"${KAFKA_PASSWORD}\" user_${KAFKA_USER}=\"${KAFKA_PASSWORD}\";"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Log topic — 4 partitions (matches max logstash-indexer replicas),
      # 4-hour retention so disk never grows unboundedly
      KAFKA_CREATE_TOPICS: "logs:4:1"
      KAFKA_LOG_RETENTION_HOURS: "4"
      KAFKA_LOG_RETENTION_BYTES: "1073741824"   # 1 GB hard cap per partition

  postgres:
    image: postgres:16-alpine
    # Port not exposed to host — only reachable within the Docker network.
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Creates the 'keycloak' database on first init (only runs on empty data dir).
      - ./postgres/init-keycloak.sql:/docker-entrypoint-initdb.d/init-keycloak.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── ELK ────────────────────────────────────────────────────────────────────

  elasticsearch:
    image: elasticsearch:8.13.0
    # Port not exposed to host — logstash and kibana connect internally.
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
      thread_pool.write.queue_size: "1000"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Ingest tier — accepts GELF from Docker, forwards to log-kafka.
  logstash-ingest:
    image: logstash:8.13.0
    depends_on:
      - log-kafka
    ports:
      # Must be bound to host — Docker daemon sends GELF logs here.
      - "12201:12201/udp"
    volumes:
      - ./logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
      PIPELINE_BATCH_SIZE: "125"
      PIPELINE_BATCH_DELAY: "5"
      KAFKA_USER: ${KAFKA_USER}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}

  # Indexer tier — reads from log-kafka, bulk-writes to Elasticsearch.
  # Scale with: docker compose up --scale logstash-indexer=4
  logstash-indexer:
    image: logstash:8.13.0
    depends_on:
      elasticsearch:
        condition: service_healthy
      log-kafka:
        condition: service_started
    volumes:
      - ./logstash/pipeline/logstash-indexer.conf:/usr/share/logstash/pipeline/logstash-indexer.conf:ro
    environment:
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
      PIPELINE_BATCH_SIZE: "1000"
      PIPELINE_BATCH_DELAY: "50"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      KAFKA_USER: ${KAFKA_USER}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
    deploy:
      replicas: 2

  kibana:
    image: kibana:8.13.0
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD}

  # ── Application services ────────────────────────────────────────────────────

  product-api:
    container_name: product-api
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_started
      logstash-ingest:
        condition: service_started
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BROKER: kafka:29092
      KAFKA_USER: ${KAFKA_USER}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
      NODE_ENV: production
      AUTH_PROVIDER_TYPE: keycloak
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/redis-api/protocol/openid-connect/certs
      KEYCLOAK_ISSUER: http://localhost:8080/realms/redis-api
      KEYCLOAK_AUDIENCE: product-api
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: redis-api
      KEYCLOAK_LOGIN_CLIENT_ID: api-test
      KEYCLOAK_ADMIN_CLIENT_ID: auth-service
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "product-api"
    restart: on-failure

  order-consumer:
    build:
      context: ./order-consumer
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      logstash-ingest:
        condition: service_started
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_USER: ${KAFKA_USER}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NODE_ENV: production
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "order-consumer"
    restart: on-failure

volumes:
  redis-data:
  postgres-data:
  es-data:
  keycloak-data:
